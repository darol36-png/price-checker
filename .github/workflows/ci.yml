name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix site

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (verify compilation)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix site

      - name: Validate deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.HERENOW_API_KEY }}" ]; then echo "::error::Brak sekretu HERENOW_API_KEY"; missing=1; fi
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then echo "::error::Brak sekretu VITE_SUPABASE_URL"; missing=1; fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then echo "::error::Brak sekretu VITE_SUPABASE_ANON_KEY"; missing=1; fi
          if [ -z "${{ vars.HERENOW_SLUG }}" ]; then echo "::error::Brak zmiennej HERENOW_SLUG (Variables, nie Secrets)"; missing=1; fi
          exit $missing

      - name: Install here.now publish script
        run: |
          git clone --depth 1 https://github.com/heredotnow/skill.git /tmp/herenow-skill
          echo "PUBLISH_SH=/tmp/herenow-skill/here-now/scripts/publish.sh" >> "$GITHUB_ENV"

      - name: Build and deploy to here.now
        run: bash scripts/ci-deploy.sh
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
          HERENOW_SLUG: ${{ vars.HERENOW_SLUG }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Smoke test production
        run: npm run test:smoke
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://${{ vars.HERENOW_SLUG }}.here.now
