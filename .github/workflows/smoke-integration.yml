name: Smoke & Integration

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Production smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix site

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Smoke tests
        run: npm run test:smoke
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_URL || 'https://onyx-nebula-z9zp.here.now' }}

  integration:
    name: Supabase RLS integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix site

      - name: RLS integration tests
        run: npm run test:integration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}
